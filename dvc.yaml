stages:
  count-words:
    cmd: python src/cdstemplate/corpus_counter_script.py data/gutenberg_counts.csv data/gutenberg --case-insensitive
    deps:
      - src/cdstemplate/corpus_counter_script.py
      - data/gutenberg
    outs:
      - data/gutenberg_counts.csv

  count-words-parallel:
    cmd: python src/cdstemplate/multithread.py data/gutenberg data/gutenberg_multicounts.csv --case-insensitive --workers 4
    deps:
      - src/cdstemplate/multithread.py
      - data/gutenberg
    outs:
      - data/gutenberg_multicounts.csv
